<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菱形格纹圆形灯罩效果图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f5f3ef;display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;padding:40px 20px}
h1{font-size:20px;color:#333;margin-bottom:8px;text-align:center}
.sub{font-size:13px;color:#999;margin-bottom:36px;text-align:center}
.views{display:flex;flex-wrap:wrap;gap:40px;justify-content:center;align-items:flex-start}
.view{text-align:center}
.view-label{font-size:13px;color:#666;margin-top:14px;font-weight:500}
.view-desc{font-size:11px;color:#aaa;margin-top:4px}
.footer{margin-top:40px;font-size:11px;color:#ccc;text-align:center}
</style>
</head>
<body>

<h1>🔮 菱形格纹圆形灯罩效果图</h1>
<div class="sub">Harlequin Diamond Pattern · Pink & Orange · Drum Shade</div>

<div class="views">

<!-- View 1: Front view - Drum shade -->
<div class="view">
<svg width="300" height="380" viewBox="0 0 300 380">
  <defs>
    <!-- Harlequin diamond pattern -->
    <pattern id="harlequin" x="0" y="0" width="40" height="48" patternUnits="userSpaceOnUse">
      <rect width="40" height="48" fill="#F4A0B0"/>
      <polygon points="20,0 40,24 20,48 0,24" fill="#E8834A"/>
    </pattern>
    <!-- Curved pattern for cylinder effect -->
    <pattern id="harlequinCurved" x="0" y="0" width="40" height="48" patternUnits="userSpaceOnUse">
      <rect width="40" height="48" fill="#F4A0B0"/>
      <polygon points="20,0 40,24 20,48 0,24" fill="#E8834A"/>
    </pattern>
    <!-- Shadow gradient for 3D effect -->
    <linearGradient id="shadeShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="15%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="85%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="rgba(255,220,180,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,220,180,0)"/>
    </radialGradient>
    <!-- Top ellipse gradient -->
    <radialGradient id="topGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,200,150,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.05)"/>
    </radialGradient>
    <clipPath id="bodyClip">
      <rect x="50" y="70" width="200" height="220" rx="2"/>
    </clipPath>
  </defs>

  <!-- Cord/wire -->
  <line x1="150" y1="0" x2="150" y2="50" stroke="#888" stroke-width="2"/>
  
  <!-- Top ring -->
  <ellipse cx="150" cy="65" rx="100" ry="18" fill="none" stroke="#C0A060" stroke-width="2.5"/>
  
  <!-- Shade body with pattern -->
  <g clip-path="url(#bodyClip)">
    <rect x="50" y="70" width="200" height="220" fill="url(#harlequin)"/>
  </g>
  
  <!-- 3D shadow overlay -->
  <rect x="50" y="70" width="200" height="220" fill="url(#shadeShadow)" rx="2"/>
  
  <!-- Inner warm glow -->
  <rect x="50" y="70" width="200" height="220" fill="url(#innerGlow)" rx="2"/>
  
  <!-- Left edge line -->
  <line x1="50" y1="70" x2="50" y2="290" stroke="#C0A060" stroke-width="1.5" opacity="0.6"/>
  <!-- Right edge line -->
  <line x1="250" y1="70" x2="250" y2="290" stroke="#C0A060" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Bottom ring -->
  <ellipse cx="150" cy="290" rx="100" ry="18" fill="none" stroke="#C0A060" stroke-width="2.5"/>
  
  <!-- Bottom inner shadow -->
  <ellipse cx="150" cy="290" rx="95" ry="15" fill="url(#topGrad)" opacity="0.5"/>
  
  <!-- Top half ellipse (visible top) -->
  <ellipse cx="150" cy="65" rx="100" ry="18" fill="#F4A0B0" opacity="0.3"/>
  <ellipse cx="150" cy="65" rx="100" ry="18" fill="none" stroke="#C0A060" stroke-width="2.5"/>
  
  <!-- Light bulb hint -->
  <ellipse cx="150" cy="100" rx="12" ry="16" fill="rgba(255,240,200,0.6)" stroke="rgba(200,180,140,0.4)" stroke-width="1"/>
  
  <!-- Subtle light rays from bottom -->
  <ellipse cx="150" cy="310" rx="80" ry="30" fill="rgba(255,230,180,0.15)"/>
</svg>
<div class="view-label">正面视图 · 圆柱形灯罩</div>
<div class="view-desc">Drum Shade · 粉橙菱形格纹</div>
</div>

<!-- View 2: Perspective view -->
<div class="view">
<svg width="300" height="380" viewBox="0 0 300 380">
  <defs>
    <pattern id="harlequin2" x="0" y="0" width="36" height="44" patternUnits="userSpaceOnUse">
      <rect width="36" height="44" fill="#F4A0B0"/>
      <polygon points="18,0 36,22 18,44 0,22" fill="#E8834A"/>
    </pattern>
    <linearGradient id="shadeShadow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.2)"/>
      <stop offset="20%" stop-color="rgba(0,0,0,0.05)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="80%" stop-color="rgba(0,0,0,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
    </linearGradient>
    <clipPath id="perspClip">
      <path d="M60,90 Q60,75 150,65 Q240,75 240,90 L240,280 Q240,295 150,305 Q60,295 60,280 Z"/>
    </clipPath>
  </defs>
  
  <!-- Cord -->
  <line x1="150" y1="0" x2="150" y2="50" stroke="#888" stroke-width="2"/>
  
  <!-- Shade body -->
  <g clip-path="url(#perspClip)">
    <rect x="50" y="60" width="200" height="250" fill="url(#harlequin2)"/>
  </g>
  
  <!-- 3D overlay -->
  <path d="M60,90 Q60,75 150,65 Q240,75 240,90 L240,280 Q240,295 150,305 Q60,295 60,280 Z" fill="url(#shadeShadow2)"/>
  
  <!-- Top ellipse -->
  <ellipse cx="150" cy="78" rx="90" ry="22" fill="#F4A0B0" opacity="0.25"/>
  <ellipse cx="150" cy="78" rx="90" ry="22" fill="none" stroke="#C0A060" stroke-width="2.5"/>
  
  <!-- Bottom ellipse -->
  <ellipse cx="150" cy="290" rx="90" ry="22" fill="none" stroke="#C0A060" stroke-width="2.5"/>
  
  <!-- Bulb -->
  <ellipse cx="150" cy="105" rx="10" ry="14" fill="rgba(255,240,200,0.6)" stroke="rgba(200,180,140,0.4)" stroke-width="1"/>
  
  <!-- Light pool -->
  <ellipse cx="150" cy="320" rx="70" ry="25" fill="rgba(255,230,180,0.15)"/>
</svg>
<div class="view-label">透视视图 · 微俯角</div>
<div class="view-desc">展示圆柱弧度和图案环绕效果</div>
</div>

<!-- View 3: With lamp base -->
<div class="view">
<svg width="300" height="450" viewBox="0 0 300 450">
  <defs>
    <pattern id="harlequin3" x="0" y="0" width="32" height="40" patternUnits="userSpaceOnUse">
      <rect width="32" height="40" fill="#F4A0B0"/>
      <polygon points="16,0 32,20 16,40 0,20" fill="#E8834A"/>
    </pattern>
    <linearGradient id="shadeShadow3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="15%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="85%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C0A060"/>
      <stop offset="50%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#A08040"/>
    </linearGradient>
    <clipPath id="bodyClip3">
      <rect x="70" y="60" width="160" height="180" rx="2"/>
    </clipPath>
  </defs>
  
  <!-- Lamp base - brass/gold style -->
  <!-- Base bottom -->
  <ellipse cx="150" cy="420" rx="55" ry="10" fill="url(#baseGrad)"/>
  <rect x="95" y="410" width="110" height="12" rx="2" fill="url(#baseGrad)"/>
  <ellipse cx="150" cy="410" rx="55" ry="10" fill="url(#baseGrad)"/>
  
  <!-- Stem -->
  <rect x="143" y="260" width="14" height="155" rx="3" fill="url(#baseGrad)"/>
  
  <!-- Stem detail ball -->
  <circle cx="150" cy="340" r="10" fill="url(#baseGrad)"/>
  <circle cx="150" cy="300" r="7" fill="url(#baseGrad)"/>
  
  <!-- Harp -->
  <path d="M130,260 Q130,240 150,230 Q170,240 170,260" fill="none" stroke="#C0A060" stroke-width="2.5"/>
  <circle cx="150" cy="228" r="4" fill="#C0A060"/>
  
  <!-- Shade body -->
  <g clip-path="url(#bodyClip3)">
    <rect x="70" y="60" width="160" height="180" fill="url(#harlequin3)"/>
  </g>
  <rect x="70" y="60" width="160" height="180" fill="url(#shadeShadow3)" rx="2"/>
  
  <!-- Top ring -->
  <ellipse cx="150" cy="55" rx="82" ry="15" fill="#F4A0B0" opacity="0.25"/>
  <ellipse cx="150" cy="55" rx="82" ry="15" fill="none" stroke="#C0A060" stroke-width="2"/>
  
  <!-- Bottom ring -->
  <ellipse cx="150" cy="240" rx="82" ry="15" fill="none" stroke="#C0A060" stroke-width="2"/>
  
  <!-- Side lines -->
  <line x1="70" y1="60" x2="70" y2="240" stroke="#C0A060" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="60" x2="230" y2="240" stroke="#C0A060" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Light glow -->
  <ellipse cx="150" cy="250" rx="60" ry="20" fill="rgba(255,230,180,0.2)"/>
</svg>
<div class="view-label">台灯搭配效果</div>
<div class="view-desc">金色灯座 + 菱形格纹灯罩</div>
</div>

</div>

<!-- Pattern reference -->
<div style="margin-top:40px;text-align:center">
  <div style="font-size:13px;color:#666;margin-bottom:10px">参考图案 · Harlequin Diamond</div>
  <svg width="200" height="60" viewBox="0 0 200 60">
    <defs>
      <pattern id="refPat" x="0" y="0" width="30" height="36" patternUnits="userSpaceOnUse">
        <rect width="30" height="36" fill="#F4A0B0"/>
        <polygon points="15,0 30,18 15,36 0,18" fill="#E8834A"/>
      </pattern>
    </defs>
    <rect width="200" height="60" rx="8" fill="url(#refPat)"/>
  </svg>
  <div style="font-size:11px;color:#aaa;margin-top:6px">Pink #F4A0B0 + Orange #E8834A</div>
</div>

<div class="footer">VIHOSE 灯罩产品拓展 · 菱形格纹圆形灯罩效果图 · 2026-03-10</div>

</body>
</html>
