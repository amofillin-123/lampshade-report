<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIHOSE 灯罩效果图 V2 - 褶皱花瓣边小灯罩</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f3ef;color:#333;padding:30px 20px}
.container{max-width:1100px;margin:0 auto}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:24px;color:#2d2d2d;margin-bottom:8px}
.header p{color:#888;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:28px}
.card{background:white;border-radius:16px;padding:30px 24px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,0.06);transition:transform .2s}
.card:hover{transform:translateY(-3px)}
.card-number{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#3a3a3a;color:white;border-radius:50%;font-size:12px;font-weight:600;margin-bottom:12px}
.card h3{font-size:15px;color:#333;margin-bottom:4px}
.card .style-tag{font-size:12px;color:#999;margin-bottom:16px}
.shade-wrap{display:flex;justify-content:center;align-items:flex-end;height:250px;margin-bottom:18px}
.color-legend{display:flex;justify-content:center;gap:16px;margin-top:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.legend-dot{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,0.1)}
.heat-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-top:10px}
.heat-high{background:#fde8e8;color:#c0392b}
.heat-mid{background:#fef3e2;color:#e67e22}
.heat-low{background:#e8f5e9;color:#27ae60}
.footer{text-align:center;color:#bbb;font-size:12px;margin-top:40px;padding-top:20px;border-top:1px solid #e8e8e8}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
</style>
<script>
function shadesvg(bodyColor, trimColor, pleateLineColor) {
  return `<svg width="200" height="230" viewBox="0 0 200 230">
  <!-- Clip-on hardware -->
  <line x1="100" y1="5" x2="100" y2="32" stroke="#b0b0b0" stroke-width="2"/>
  <ellipse cx="100" cy="34" rx="5" ry="4" fill="none" stroke="#b0b0b0" stroke-width="1.8"/>
  <line x1="72" y1="34" x2="128" y2="34" stroke="#b0b0b0" stroke-width="1.5"/>
  <line x1="72" y1="34" x2="62" y2="48" stroke="#b0b0b0" stroke-width="1.2"/>
  <line x1="128" y1="34" x2="138" y2="48" stroke="#b0b0b0" stroke-width="1.2"/>

  <!-- Shade body - bell shape -->
  <path d="M62,48 Q60,46 65,44 L135,44 Q140,46 138,48 L152,158 Q153,164 148,168 L52,168 Q47,164 48,158 Z" fill="${bodyColor}" stroke="${trimColor}" stroke-width="0.8"/>

  <!-- Pleated lines (vertical folds) -->
  <line x1="72" y1="46" x2="58" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="80" y1="45" x2="68" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="88" y1="44.5" x2="78" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="96" y1="44.2" x2="88" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="104" y1="44.2" x2="98" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="112" y1="44.5" x2="108" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="120" y1="45" x2="118" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="128" y1="46" x2="128" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="136" y1="47" x2="138" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>
  <line x1="100" y1="44" x2="93" y2="165" stroke="${pleateLineColor}" stroke-width="0.6" opacity="0.5"/>

  <!-- Top trim band -->
  <rect x="62" y="44" width="76" height="5" rx="2" fill="${trimColor}" opacity="0.9"/>

  <!-- Scalloped petal edge - large petals like reference image -->
  <ellipse cx="52" cy="165" rx="12" ry="16" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>
  <ellipse cx="68" cy="168" rx="12" ry="18" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>
  <ellipse cx="84" cy="170" rx="12" ry="19" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>
  <ellipse cx="100" cy="171" rx="12" ry="20" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>
  <ellipse cx="116" cy="170" rx="12" ry="19" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>
  <ellipse cx="132" cy="168" rx="12" ry="18" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>
  <ellipse cx="148" cy="165" rx="12" ry="16" fill="${bodyColor}" stroke="${trimColor}" stroke-width="2"/>

  <!-- Cover the top half of petals with body -->
  <rect x="47" y="140" width="106" height="28" fill="${bodyColor}" stroke="none"/>

  <!-- Re-draw bottom body edge -->
  <line x1="48" y1="158" x2="152" y2="158" stroke="none"/>

  <!-- Petal trim highlight -->
  <path d="M42,165 Q52,185 62,165 Q68,190 78,168 Q84,193 94,170 Q100,195 110,170 Q116,193 126,168 Q132,190 142,165 Q148,185 158,162" fill="none" stroke="${trimColor}" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Inner glow -->
  <ellipse cx="100" cy="120" rx="32" ry="50" fill="white" opacity="0.12"/>
</svg>`;
}

const schemes = [
  {n:1, name:"经典奶油金", en:"Cream & Antique Gold", style:"Grandmillennial · 最高潜力款", body:"#FFF8E7", trim:"#C9A243", pleat:"#E8DFC0", heat:"high",
   bodyName:"奶油白 Cream", trimName:"古金色 Antique Gold"},
  {n:2, name:"复古玫瑰", en:"Dusty Rose & Champagne", style:"Cottagecore · Quiet Luxury", body:"#E8C4C4", trim:"#C9A96E", pleat:"#D4AEAE", heat:"high",
   bodyName:"灰粉 Dusty Rose", trimName:"香槟金 Champagne"},
  {n:3, name:"鼠尾草绿", en:"Sage Green & Taupe", style:"Organic Modern · 自然疗愈系", body:"#B7C9A8", trim:"#8B7D6B", pleat:"#A3B894", heat:"high",
   bodyName:"鼠尾草绿 Sage", trimName:"灰褐 Taupe"},
  {n:4, name:"深梅紫金", en:"Plum Noir & Gold", style:"Pinterest 2026 年度色 · NeoDeco", body:"#6B3A5E", trim:"#C9A243", pleat:"#5A2E50", heat:"high",
   bodyName:"深梅紫 Plum Noir", trimName:"金色 Gold"},
  {n:5, name:"海军蓝银", en:"Navy Blue & Silver", style:"Coastal Grandmother · 经典永恒", body:"#2C3E6B", trim:"#B8C0CC", pleat:"#243358", heat:"mid",
   bodyName:"海军蓝 Navy", trimName:"银灰 Silver"},
  {n:6, name:"暖亚麻", en:"Warm Linen & Terracotta", style:"Boho · Organic 大地色系", body:"#E8DCC8", trim:"#C67B4B", pleat:"#D8CCAE", heat:"mid",
   bodyName:"暖亚麻 Warm Linen", trimName:"赤陶 Terracotta"},
  {n:7, name:"芥末绿", en:"Wasabi & Brass", style:"Pinterest 2026 年度色 · Dopamine", body:"#C5CC4E", trim:"#A8923E", pleat:"#B5BC3E", heat:"mid",
   bodyName:"芥末绿 Wasabi", trimName:"黄铜 Brass"},
  {n:8, name:"薰衣草", en:"Lavender & Pearl", style:"Whimsical · 梦幻少女系", body:"#C8B8D8", trim:"#E8E0E8", pleat:"#B8A4CA", heat:"mid",
   bodyName:"薰衣草紫 Lavender", trimName:"珍珠白 Pearl"},
  {n:9, name:"柿子橙", en:"Persimmon & Ivory", style:"Pinterest 2026 年度色 · 活力暖调", body:"#E07040", trim:"#F5EDE0", pleat:"#CC6038", heat:"mid",
   bodyName:"柿子橙 Persimmon", trimName:"象牙白 Ivory"},
  {n:10, name:"烟灰炭", en:"Charcoal & Copper", style:"Industrial Chic · 高级质感", body:"#4A4A4A", trim:"#C87533", pleat:"#3A3A3A", heat:"low",
   bodyName:"烟灰 Charcoal", trimName:"铜色 Copper"}
];

document.addEventListener('DOMContentLoaded', function(){
  const grid = document.querySelector('.grid');
  schemes.forEach(s => {
    grid.innerHTML += `
    <div class="card">
      <div class="card-number">${s.n}</div>
      <h3>${s.name} ${s.en}</h3>
      <div class="style-tag">${s.style}</div>
      <div class="shade-wrap">${shadesvg(s.body, s.trim, s.pleat)}</div>
      <div class="color-legend">
        <div class="legend-item"><div class="legend-dot" style="background:${s.body}"></div>底布：${s.bodyName}</div>
        <div class="legend-item"><div class="legend-dot" style="background:${s.trim}"></div>包边：${s.trimName}</div>
      </div>
      <span class="heat-badge heat-${s.heat}">${s.heat==='high'?'🔥 极高':s.heat==='mid'?'⭐ 中高':'💡 潜力'}</span>
    </div>`;
  });
});
</script>
</head>
<body>
<div class="container">
<div class="header">
  <h1>🔮 VIHOSE 褶皱花瓣边小灯罩 — 10款配色效果图</h1>
  <p>Pleated Scalloped Bell Shade · Clip-on · 2.9"×5.9"×5.1" · 底布色 + 花瓣包边色 · 参考图2款式</p>
</div>
<div class="grid"></div>
<div class="footer">基于 TikTok / Pinterest / Instagram 2026 家居流行趋势 · 创新小章 🐙 · 2026-03-10</div>
</div>
</body>
</html>
